<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail - FOB Media</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/project-detail.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <ul class="nav-left">
                <li><a href="work.html">Work</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="#">Ideas</a></li>
            </ul>
            <div class="nav-logo visible" id="navLogo">
                <a href="index.html" style="color: #fff; text-decoration: none;">FOB Media</a>
            </div>
            <ul class="nav-right">
                <li><a href="careers.html">Careers</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Project Detail Content -->
    <div class="project-detail-container">
        <!-- Hero Video/Image -->
        <section class="project-hero">
            <div class="video-container" id="projectVideo">
                <!-- Video or image will be loaded here -->
            </div>
        </section>

        <!-- Project Info -->
        <section class="project-info">
            <div class="project-meta">
                <div class="meta-item">
                    <span class="meta-label">Client</span>
                    <span class="meta-value" id="projectClient"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Category</span>
                    <span class="meta-value" id="projectCategory"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Year</span>
                    <span class="meta-value" id="projectYear"></span>
                </div>
            </div>

            <h1 class="project-title" id="projectTitle"></h1>
            
            <div class="project-description" id="projectDescription"></div>
        </section>

        <!-- Challenge Section -->
        <section class="project-section">
            <h2 class="section-heading">The Challenge</h2>
            <div class="section-content" id="projectChallenge"></div>
        </section>

        <!-- Solution Section -->
        <section class="project-section">
            <h2 class="section-heading">Our Approach</h2>
            <div class="section-content" id="projectSolution"></div>
        </section>

        <!-- Gallery/Additional Media -->
        <section class="project-gallery" id="projectGallery">
            <!-- Gallery images will be loaded here -->
        </section>

        <!-- Results Section -->
        <section class="project-section">
            <h2 class="section-heading">The Results</h2>
            <div class="section-content" id="projectResults"></div>
        </section>

        <!-- Navigation to Next/Previous Projects -->
        <section class="project-navigation">
            <a href="#" class="nav-project prev" id="prevProject">
                <span class="nav-label">Previous Project</span>
                <span class="nav-title"></span>
            </a>
            <a href="#" class="nav-project next" id="nextProject">
                <span class="nav-label">Next Project</span>
                <span class="nav-title"></span>
            </a>
        </section>
    </div>

    <!-- Floating Footer -->
    <footer class="floating-footer" id="floatingFooter">
        <div class="footer-left">
            <p><strong>FOB Media</strong></p>
            <p>Creating impact through film</p>
        </div>
        <div class="footer-right">
            <a href="mailto:hello@fobmedia.com" class="footer-link">hello@fobmedia.com</a>
            <a href="tel:+254700000000" class="footer-link">+254 700 000 000</a>
            <a href="#" class="footer-link">Instagram</a>
            <a href="#" class="footer-link">LinkedIn</a>
        </div>
    </footer>

    <script src="js/navigation.js"></script>
    <script src="js/project-detail.js"></script>
</body>
</html>
